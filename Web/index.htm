<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>XY Optical Drive V0.1.0</title>
</head>
<body style="font-family:Arial, sans-serif; padding:16px; background-color:#1e1e1e; color:#e0e0e0;">
  <h1>XY Optical Drive</h1>
  <p><strong>Version:</strong> V0.1.0</p>
  <p>Page generated directly by firmware.</p>
  <p>API status endpoint: <a href="/status">/status</a></p>
  <p><em>Uptime: <span id="uptime">...</span></em></p>

  <hr>
  <h2>Hardware Setup Report</h2>
  <pre id="hwstatus" style="background:#2d2d2d; padding:12px; border:1px solid #404040; white-space:pre-wrap; color:#e0e0e0;">Loading...</pre>

  <hr>
  <h2>Motor Control</h2>
  <style>
    .mb { font-size:1.2em; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; background:#2d2d2d; color:#e0e0e0; margin-right:4px; border:1px solid #404040; }
    .mb:hover { background:#3a3a3a; }
  </style>
  <div style="margin:12px 0;">
    <button id="b-ccw" class="mb" onclick="cmd('ccw')">&#9664; CCLKW</button>
    <button id="b-stop" class="mb" onclick="cmd('stop')">&#9646;&#9646; Stop</button>
    <button id="b-cw" class="mb" onclick="cmd('cw')">CLKW &#9654;</button>
  </div>
  <p id="ms">Status: stopped</p>
  <p id="mdetail" style="color:#9e9e9e; font-size:0.9em;">Modbus: idle</p>

  <script>
    var L = {
      cw: 'Running CW',
      ccw: 'Running CCLKW',
      stop: 'Stopped',
      starting_cw: 'Starting CW...',
      starting_ccw: 'Starting CCLKW...',
      stopping: 'Stopping...',
      stopped: 'Stopped'
    };
    var B = ['cw', 'ccw', 'stop'];

    function formatMotorStatus(d) {
      var label = L[d.motor_state] || d.motor_state;
      if (d.pending) {
        label += ' (pending)';
      }
      return label;
    }

    function updateMotorUi(d, activeBtn) {
      document.getElementById('ms').textContent = 'Status: ' + formatMotorStatus(d);
      document.getElementById('mdetail').textContent =
        'Modbus result=' + d.last_modbus_result + ', last_tx=' + d.last_modbus_ms + ' ms';

      B.forEach(function(x) {
        var b = document.getElementById('b-' + x);
        var active = activeBtn === x ||
          (x === 'cw' && (d.motor_state === 'cw' || d.motor_state === 'starting_cw')) ||
          (x === 'ccw' && (d.motor_state === 'ccw' || d.motor_state === 'starting_ccw')) ||
          (x === 'stop' && (d.motor_state === 'stopped' || d.motor_state === 'stopping'));
        b.style.background = active ? '#4CAF50' : '#2d2d2d';
        b.style.color = active ? 'white' : '#e0e0e0';
      });
    }

    function refreshStatus() {
      return fetch('/status').then(function(r) { return r.json(); }).then(function(d) {
        document.getElementById('uptime').textContent = Math.floor(d.uptime / 1000) + ' s';
        updateMotorUi(d, null);
      });
    }

    fetch('/hwstatus').then(function(r){ return r.text(); }).then(function(t){
      document.getElementById('hwstatus').textContent = t;
    });

    function cmd(d) {
      fetch('/' + d).then(function(r) { return r.json(); }).then(function(j) {
        updateMotorUi(j, d);
      }).catch(function() {
        document.getElementById('ms').textContent = 'Status: request failed';
      });
    }

    refreshStatus();
    setInterval(refreshStatus, 500);
  </script>
</body>
</html>

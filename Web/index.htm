<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>XY Optical Drive V1.2.0</title>
</head>
<body style="font-family:Arial, sans-serif; padding:16px; background-color:#1e1e1e; color:#e0e0e0;">
  <h1>XY Optical Drive</h1>
  <p><strong>Version:</strong> V1.2.0</p>
  <p><em>Uptime: <span id="uptime">...</span></em></p>

  <hr>
  <h2>Hardware Setup Report</h2>
  <pre id="hwstatus" style="background:#2d2d2d; padding:12px; border:1px solid #404040; white-space:pre-wrap; color:#e0e0e0;">Loading...</pre>

  <hr>
  <h2>Motor Control</h2>
  <style>
    .mb { font-size:1.2em; padding:10px 20px; border:none; border-radius:6px; cursor:pointer; background:#2d2d2d; color:#e0e0e0; margin-right:4px; border:1px solid #404040; user-select:none; -webkit-user-select:none; touch-action:manipulation; }
    .mb:hover { background:#3a3a3a; }
    .mb:disabled { opacity:.4; cursor:default; }
    .mb:disabled:hover { background:#2d2d2d; }
    #b-ccw, #b-stop, #b-cw { font-size:0.95em; padding:8px 10px; }
    .mb.jog.pressed { background:#4CAF50; color:white; border-color:#4CAF50; }
    .mb.stop.armed { background:#4CAF50; color:white; border-color:#4CAF50; }
    .mb.home { border-color:#7a5c00; }
    .mb.home.busy { background:#7a5c00; color:#fff; border-color:#b58900; }
    .mb.go { border-color:#1565c0; }
    .mb.go.busy { background:#1565c0; color:#fff; border-color:#42a5f5; }
    .posin { font-size:1.2em; padding:10px; width:7em; border-radius:6px; border:1px solid #404040; background:#2d2d2d; color:#e0e0e0; margin-right:4px; }
    .posin:disabled { opacity:.4; }
  </style>
  <div style="display:flex; gap:24px; flex-wrap:wrap; align-items:flex-start;">
  <div style="flex:1 1 320px; min-width:300px;">
  <div style="margin:12px 0; white-space:nowrap;">
    <button id="b-ccw" class="mb jog">&#9664; CCLKW</button>
    <button id="b-stop" class="mb stop" onclick="cmdStop()">&#9646;&#9646; Stop</button>
    <button id="b-cw" class="mb jog">CLKW &#9654;</button>
  </div>
  <div style="margin:12px 0;">
    <input id="i-speed" class="posin" type="number" step="1" min="5" max="400" placeholder="rpm">
    <button id="b-speed" class="mb" onclick="cmdSpeed()">Set speed</button>
  </div>
  <div style="margin:12px 0;">
    <input id="i-goto" class="posin" type="number" step="0.01" min="0" placeholder="mm" disabled>
    <button id="b-goto" class="mb go" onclick="cmdGoto()" disabled>Go to position</button>
  </div>
  <p id="ms">Status: stopped</p>
  <p id="spd" style="color:#9e9e9e;">Speed: &mdash;</p>
  <p id="move" style="color:#9e9e9e;">Go to: requires homing</p>
  <p id="pos" style="font-size:1.1em;">Position: ...</p>
  <p id="mdetail" style="color:#9e9e9e; font-size:0.9em;">Modbus: idle</p>
  </div>

  <div style="flex:0 0 270px; border:1px solid #404040; border-radius:8px; padding:12px;">
    <h3 style="margin-top:0;">Motors</h3>
    <div id="mlist"></div>
    <div style="margin-top:10px;">
      <input id="i-mname" class="posin" style="width:6.5em;" maxlength="10" placeholder="name">
      <input id="i-mid" class="posin" style="width:3.5em;" type="number" min="1" max="247" placeholder="ID">
    </div>
    <div style="margin-top:8px;">
      <button id="b-madd" class="mb" onclick="cmdMotorAdd()">Add motor</button>
    </div>
    <p id="mmsg" style="color:#9e9e9e; font-size:0.9em;">Slave ID: 1-31 via DIP switches</p>
  </div>
  </div>

  <hr>
  <h2>Calibration (Torque Homing)</h2>
  <div style="margin:12px 0;">
    <button id="b-home" class="mb home" onclick="cmdHome()">&#8634; Start homing</button>
  </div>
  <p id="homing">Homing: not started</p>
  <p id="maxlen" style="font-size:1.1em;">Max length: &mdash;</p>
  <p id="limits" style="font-size:1.1em;">Limits: &mdash;</p>

  <script>
    var CFG = {
      cmdPulsesPerRev: 10000,        // PR / "go to" command unit (drive Pr0.08)
      feedbackCountsPerRev: 65536,   // feedback register 0x1014/0x1015 unit (field-derived)
      screwPitchMm: 5.0,
      cwIncreasesMm: 1
    };

    var STATUS_POLL_MS = 1000;   // /status is cache-only on the firmware side

    var L = {
      cw: 'Running CW',
      ccw: 'Running CCLKW',
      stopped: 'Stopped'
    };

    var HOMING_ERRORS = {
      1: 'config write failed (speeds/direction, Modbus, after 3 attempts)',
      2: 'homing trigger write failed (Modbus, after 3 attempts)',
      3: 'zero-set write failed (Modbus, after 3 attempts)',
      4: 'drive fault (alarm) during homing',
      5: 'aborted by Stop (emergency stop)',
      6: 'position read failed after homing - run the homing again'
    };

    var MOVE_ERRORS = {
      1: 'PR0 config/trigger write failed (Modbus)',
      2: 'drive fault (alarm) during the move',
      3: 'aborted by Stop (emergency stop)',
      4: 'position read failed before the move'
    };

    var motorState = 'stopped';
    var lastStatus = null;
    var holdActive = false;
    var stopArmed = false;       // true after pressing Stop, cleared by the next jog press
    var homingActive = false;
    var moveActive = false;
    var isHomed = false;
    var lastGotoMm = null;       // target of the last requested move, for display

    var activeSlaveId = 0;       // currently selected Modbus slave (from /status)
    var lastMotorsKey = '';      // render cache for the Motors panel
    var limitsOn = false;        // soft limits active (set by the firmware after homing)
    var limit1Mm = 0;            // lower limit = 10 mm after 0
    var limit2Mm = 0;            // upper limit = max length - 10 mm
    var limit1AlertShown = false; // acknowledgeable pop-up shown for the current limit1_hit
    var limit2AlertShown = false; // acknowledgeable pop-up shown for the current limit2_hit

    function signedCountsForDisplay(counts) {
      return counts * CFG.cwIncreasesMm;
    }

    function countsToMm(counts) {
      // Feedback register unit: 65536 counts per motor revolution.
      return signedCountsForDisplay(counts) * CFG.screwPitchMm / CFG.feedbackCountsPerRev;
    }

    function cmdPulsesToMm(p) {
      // Command unit: 10000 pulses per revolution (Pr0.08).
      return p * CFG.cwIncreasesMm * CFG.screwPitchMm / CFG.cmdPulsesPerRev;
    }

    function mmToCmdPulses(mm) {
      return Math.round(mm * CFG.cmdPulsesPerRev / CFG.screwPitchMm) * CFG.cwIncreasesMm;
    }

    function formatMm(mm) {
      return mm.toFixed(4);
    }

    function syncMotorStateFromServer(state) {
      if (state === 'cw' || state === 'ccw' || state === 'stopped') {
        motorState = state;
      }
    }

    function updateButtonColors() {
      document.getElementById('b-stop').classList.toggle('armed', stopArmed);
    }

    function guardMoving() {
      return !!(lastStatus && lastStatus.move_guard === true &&
                lastStatus.move_state === 'moving');
    }

    function updateMotorUi() {
      var msText = 'Status: ' + (L[motorState] || motorState);
      if (guardMoving()) {
        msText = (lastStatus.guard_limit === 2)
          ? 'Status: CW guarded (bounded by Limit 2)'
          : 'Status: CCW guarded (bounded by Limit 1)';
      }
      document.getElementById('ms').textContent = msText;
      updateButtonColors();

      if (lastStatus && lastStatus.feedback_position_valid) {
        var counts = lastStatus.feedback_position;   // HOMED frame, feedback counts
        var mm = countsToMm(counts);
        var suffix = '';
        if (homingActive) suffix = ' \u2014 frozen while homing';
        else if (moveActive) suffix = ' \u2014 frozen while moving';
        else if (motorState !== 'stopped') suffix = ' \u2014 frozen while jogging';
        if (!isHomed && !homingActive) suffix += ' (not homed)';
        else if (isHomed && lastStatus.homed_restored) suffix += ' (restored ref)';
        var vb = (lastStatus.vbus > 0)
          ? ' | Vbus ' + (lastStatus.vbus / 10).toFixed(1) + ' V' : '';
        document.getElementById('pos').textContent =
          'Position: ' + formatMm(mm) + ' mm (' + signedCountsForDisplay(counts) + ' counts)' + vb + suffix;
        document.getElementById('mdetail').textContent =
          'Modbus result=' + lastStatus.last_modbus_result +
          ', last_tx=' + lastStatus.last_modbus_ms + ' ms' +
          ', mb-timeouts=' + lastStatus.modbus_timeouts;
      } else if (lastStatus) {
        document.getElementById('pos').textContent = 'Position: read failed';
        document.getElementById('mdetail').textContent =
          'Modbus result=' + lastStatus.last_modbus_result +
          ', last_tx=' + lastStatus.last_modbus_ms + ' ms' +
          ', mb-timeouts=' + lastStatus.modbus_timeouts;
      }
    }

    // keepCcw / keepCw = true while the matching guarded move runs: the held
    // button must stay enabled, otherwise its mouseup/touchend could be lost.
    function setMotionButtonsEnabled(enabled, keepCcw, keepCw) {
      document.getElementById('b-cw').disabled = !enabled && !keepCw;
      document.getElementById('b-ccw').disabled = !enabled && !keepCcw;
      document.getElementById('b-home').disabled = !enabled;
      document.getElementById('b-speed').disabled = !enabled;
      document.getElementById('i-speed').disabled = !enabled;
      // Go-to is additionally gated on a completed homing.
      document.getElementById('b-goto').disabled = !enabled || !isHomed;
      document.getElementById('i-goto').disabled = !enabled || !isHomed;
    }

    function updateHomingUi(d) {
      var st = d.homing_state || 'idle';
      var el = document.getElementById('homing');
      var busy = (st === 'pass1' || st === 'pass2');

      homingActive = busy;
      document.getElementById('b-home').classList.toggle('busy', busy);

      if (st === 'pass1') {
        el.textContent = 'Homing pass 1/2 \u2014 CW toward the far hard stop at 200 rpm... (Stop = abort)';
        el.style.color = '#b58900';
      } else if (st === 'pass2') {
        el.textContent = 'Homing pass 2/2 \u2014 CCW across the axis at 200 rpm... (Stop = abort)';
        el.style.color = '#b58900';
      } else if (st === 'done') {
        el.textContent = 'Homing OK \u2014 zero set at the CCW hard stop';
        el.style.color = '#4CAF50';
      } else if (st === 'error') {
        var code = d.homing_error || 0;
        el.textContent = 'Homing FAILED (code ' + code + '): ' +
          (HOMING_ERRORS[code] || 'unknown error');
        el.style.color = '#e57373';
      } else {
        el.textContent = 'Homing: not started';
        el.style.color = '';
      }

      // Max length: measured during pass 2, BEFORE the final zero-set.
      var ml = document.getElementById('maxlen');
      if (d.max_travel_counts > 0) {
        var mlMm = Math.abs(countsToMm(d.max_travel_counts));
        ml.textContent = 'Max length: ' + mlMm.toFixed(2) + ' mm (' +
          d.max_travel_counts + ' counts)';
        ml.style.color = '#4CAF50';
      } else {
        ml.textContent = 'Max length: \u2014';
        ml.style.color = '';
      }

      // Soft limits: Limit 1 = 10 mm after 0, Limit 2 = max length - 10 mm.
      var lim = document.getElementById('limits');
      var inp = document.getElementById('i-goto');
      if (limitsOn) {
        lim.textContent = 'Limits: ' + limit1Mm.toFixed(2) + ' mm \u2194 ' +
          limit2Mm.toFixed(2) + ' mm';
        lim.style.color = '#4CAF50';
        inp.min = limit1Mm.toFixed(2);
        inp.max = limit2Mm.toFixed(2);
      } else {
        lim.textContent = 'Limits: \u2014';
        lim.style.color = '';
        inp.min = 0;
        inp.removeAttribute('max');
      }
    }

    function updateMoveUi(d) {
      var st = d.move_state || 'idle';
      var el = document.getElementById('move');
      var busy = (st === 'moving');
      var guard = (d.move_guard === true);

      moveActive = busy;
      document.getElementById('b-goto').classList.toggle('busy', busy && !guard);

      if (!isHomed) {
        el.textContent = 'Go to: requires homing';
        el.style.color = '#9e9e9e';
      } else if (busy && guard) {
        el.textContent = (d.guard_limit === 2)
          ? 'CW guarded: moving toward Limit 2 (' + limit2Mm.toFixed(2) + ' mm)... (release = stop)'
          : 'CCW guarded: moving toward Limit 1 (' + limit1Mm.toFixed(2) + ' mm)... (release = stop)';
        el.style.color = '#42a5f5';
      } else if (busy) {
        el.textContent = 'Go to: moving' +
          (lastGotoMm !== null ? ' to ' + formatMm(lastGotoMm) + ' mm' : '') +
          '... (Stop = abort)';
        el.style.color = '#42a5f5';
      } else if (st === 'done' && guard) {
        el.textContent = (d.guard_limit === 2)
          ? 'CW guarded: stopped at Limit 2 (' + limit2Mm.toFixed(2) + ' mm)'
          : 'CCW guarded: stopped at Limit 1 (' + limit1Mm.toFixed(2) + ' mm)';
        el.style.color = '#4CAF50';
      } else if (st === 'done') {
        el.textContent = 'Go to: done' +
          (lastGotoMm !== null ? ' \u2014 target ' + formatMm(lastGotoMm) + ' mm' : '');
        el.style.color = '#4CAF50';
      } else if (st === 'error') {
        var code = d.move_error || 0;
        el.textContent = 'Go to FAILED (code ' + code + '): ' +
          (MOVE_ERRORS[code] || 'unknown error');
        el.style.color = '#e57373';
      } else {
        el.textContent = limitsOn
          ? 'Go to: ready (' + limit1Mm.toFixed(2) + ' \u2013 ' + limit2Mm.toFixed(2) + ' mm)'
          : 'Go to: ready (0 mm = CCW hard stop)';
        el.style.color = '#9e9e9e';
      }
    }

    function renderMotors(d, enabled) {
      var motors = d.motors || [];
      var key = JSON.stringify(motors) + '|' + d.slave_id + '|' + (enabled ? 1 : 0);
      if (key === lastMotorsKey) return;
      lastMotorsKey = key;
      var list = document.getElementById('mlist');
      list.innerHTML = '';
      for (var k = 0; k < motors.length; k++) {
        (function(m) {
          var row = document.createElement('div');
          row.style.margin = '6px 0';
          var sel = document.createElement('button');
          sel.className = 'mb' + (m.i === d.slave_id ? ' jog pressed' : '');
          sel.style.fontSize = '0.95em';
          sel.style.padding = '6px 10px';
          sel.textContent = m.n;
          sel.disabled = !enabled;
          sel.onclick = function() { cmdMotorSel(m.i, m.n, m.c === 1); };
          row.appendChild(sel);
          var idTag = document.createElement('span');
          idTag.style.color = '#9e9e9e';
          idTag.style.margin = '0 6px';
          var info = 'ID ' + m.i;
          if (m.c === 1) {
            info += ' \u00b7 cal ' + Math.abs(countsToMm(m.x)).toFixed(1) + ' mm' +
                    ' \u00b7 last ' + Math.abs(cmdPulsesToMm(m.p)).toFixed(2) + ' mm';
          }
          idTag.textContent = info;
          row.appendChild(idTag);
          if (m.i !== d.slave_id) {
            var del = document.createElement('button');
            del.className = 'mb';
            del.style.fontSize = '0.95em';
            del.style.padding = '6px 10px';
            del.style.borderColor = '#7a1f1f';
            del.textContent = '\u2715';
            del.disabled = !enabled;
            del.onclick = function() { cmdMotorDel(m.i, m.n); };
            row.appendChild(del);
          }
          list.appendChild(row);
        })(motors[k]);
      }
      document.getElementById('b-madd').disabled = !enabled;
      document.getElementById('i-mname').disabled = !enabled;
      document.getElementById('i-mid').disabled = !enabled;
    }

    function motorMsg(text, isError) {
      var el = document.getElementById('mmsg');
      el.textContent = text;
      el.style.color = isError ? '#e57373' : '#9e9e9e';
    }

    function cmdMotorSel(id, name, cal) {
      if (homingActive || moveActive || motorState !== 'stopped') return;
      if (id === activeSlaveId) {
        // Re-selecting the active motor only makes sense to RESTORE its
        // saved calibration after an Arduino reboot (drive kept powered).
        if (isHomed || !cal) return;
        if (!confirm('Restore the saved calibration of "' + name + '"?\n\n' +
          'Only valid if the drive stayed powered since it was homed.')) return;
      } else {
        var msg = cal
          ? 'Switch to "' + name + '" (Slave ID ' + id + ')?\n\n' +
            'Its SAVED calibration will be restored (goto stays available).\n' +
            'Only valid if the drive stayed powered; re-home if unsure.'
          : 'Switch to "' + name + '" (Slave ID ' + id + ')?\n\n' +
            'Homing, limits and the position reference will be reset:\n' +
            're-run the homing on the new motor.';
        if (!confirm(msg)) return;
      }
      fetch('/msel?i=' + id).then(function(r) { return r.json(); }).then(function(j) {
        if (j.error) { motorMsg('Select rejected (' + j.error + ')', true); return; }
        motorMsg('Active motor: ' + name + ' (ID ' + id + ')', false);
        return refreshStatus();
      }).catch(function() { motorMsg('Select request failed', true); });
    }

    function cmdMotorAdd() {
      if (homingActive || moveActive || motorState !== 'stopped') return;
      var name = document.getElementById('i-mname').value;
      var id = parseInt(document.getElementById('i-mid').value, 10);
      if (!/^[A-Za-z0-9_-]{1,10}$/.test(name)) {
        motorMsg('Name: 1-10 chars A-Z a-z 0-9 _ -', true);
        return;
      }
      if (!isFinite(id) || id < 1 || id > 247) {
        motorMsg('Slave ID: 1-247 (DIP: 1-31)', true);
        return;
      }
      fetch('/madd?i=' + id + '&n=' + name).then(function(r) { return r.json(); }).then(function(j) {
        if (j.error) { motorMsg('Add rejected (' + j.error + ')', true); return; }
        document.getElementById('i-mname').value = '';
        document.getElementById('i-mid').value = '';
        motorMsg('Motor "' + name + '" added (ID ' + id + ')', false);
        return refreshStatus();
      }).catch(function() { motorMsg('Add request failed', true); });
    }

    function cmdMotorDel(id, name) {
      if (homingActive || moveActive || motorState !== 'stopped') return;
      if (id === activeSlaveId) { motorMsg('Select another motor first', true); return; }
      if (!confirm('Delete motor "' + name + '" (Slave ID ' + id + ')?')) return;
      fetch('/mdel?i=' + id).then(function(r) { return r.json(); }).then(function(j) {
        if (j.error) { motorMsg('Delete rejected (' + j.error + ')', true); return; }
        motorMsg('Motor "' + name + '" deleted', false);
        return refreshStatus();
      }).catch(function() { motorMsg('Delete request failed', true); });
    }

    function setJogPressed(id, pressed) {
      document.getElementById(id).classList.toggle('pressed', pressed);
    }

    function clearJogPressed() {
      setJogPressed('b-cw', false);
      setJogPressed('b-ccw', false);
    }

    function refreshStatus() {
      return fetch('/status').then(function(r) { return r.json(); }).then(function(d) {
        // V1.2.0 flash diet: the firmware now sends SHORT keys, 1/0 booleans
        // and numeric enum states. Translate once here; everything below
        // keeps the original verbose names.
        d.uptime = d.up;
        d.feedback_position = d.fp;
        d.homed = d.h === 1;
        d.homed_restored = d.hr === 1;
        d.feedback_position_valid = d.fv === 1;
        d.last_modbus_result = d.mr;
        d.last_modbus_ms = d.mt;
        d.modbus_timeouts = d.mto;
        d.speed_rpm = d.sp;
        d.slave_id = d.si;
        d.vbus = d.vb;
        d.motors = d.mo;
        d.homing_state = ['idle','pass1','pass2','pass2','done','error'][d.hs] || 'idle';
        d.homing_error = d.he;
        d.max_travel_counts = d.mx;
        d.limits_active = d.la === 1;
        d.limit1_cmd = d.l1;
        d.limit2_cmd = d.l2;
        d.limit1_hit = d.h1 === 1;
        d.limit2_hit = d.h2 === 1;
        d.move_guard = d.mg === 1;
        d.guard_limit = d.gl;
        d.move_state = ['idle','moving','done','error'][d.mvs] || 'idle';
        d.move_error = d.mve;
        d.motor_state = ['stopped','cw','ccw'][d.ms] || 'stopped';
        lastStatus = d;
        isHomed = (d.homed === true);
        limitsOn = (d.limits_active === true);
        if (limitsOn) {
          limit1Mm = Math.abs(cmdPulsesToMm(d.limit1_cmd));
          limit2Mm = Math.abs(cmdPulsesToMm(d.limit2_cmd));
        }
        activeSlaveId = d.slave_id || 0;
        if (typeof d.speed_rpm === 'number') {
          var sEl = document.getElementById('spd');
          sEl.textContent = 'Speed: ' + d.speed_rpm + ' rpm (JOG, guarded jogs and Go to)';
          sEl.style.color = '#9e9e9e';
          var sIn = document.getElementById('i-speed');
          if (document.activeElement !== sIn && !sIn.value) sIn.value = d.speed_rpm;
        }
        if (!holdActive && d.motor_state) {
          syncMotorStateFromServer(d.motor_state);
        }
        document.getElementById('uptime').textContent = Math.floor(d.uptime / 1000) + ' s';
        updateHomingUi(d);
        updateMoveUi(d);
        var gl = guardMoving() ? lastStatus.guard_limit : 0;
        setMotionButtonsEnabled(!homingActive && !moveActive, gl === 1, gl === 2);
        renderMotors(d, !homingActive && !moveActive && motorState === 'stopped');
        updateMotorUi();

        // Acknowledgeable warning pop-ups: a limit was reached (or the motor
        // was brought back to it) during a guarded jog move.
        if (d.limit1_hit === true && !limit1AlertShown) {
          limit1AlertShown = true;
          alert('LIMIT 1 REACHED (' + limit1Mm.toFixed(2) + ' mm)\n\n' +
                'The motor stopped at the lower limit.\n' +
                'CCW motion cannot go below this position.');
        }
        if (d.limit1_hit !== true) {
          limit1AlertShown = false;
        }
        if (d.limit2_hit === true && !limit2AlertShown) {
          limit2AlertShown = true;
          alert('LIMIT 2 REACHED (' + limit2Mm.toFixed(2) + ' mm)\n\n' +
                'The motor stopped at the upper limit.\n' +
                'CW motion cannot go above this position.');
        }
        if (d.limit2_hit !== true) {
          limit2AlertShown = false;
        }
      });
    }

    fetch('/hwstatus').then(function(r){ return r.text(); }).then(function(t){
      document.getElementById('hwstatus').textContent = t;
    });

    function startHold(direction) {
      if (homingActive || moveActive) return;
      if (holdActive && motorState === direction) return;
      holdActive = true;
      stopArmed = false;
      motorState = direction;
      updateMotorUi();
      fetch('/' + direction).then(function(r) { return r.json(); }).then(function(j) {
        if (j.error) {                   // HTTP 409: homing or move in progress
          holdActive = false;
          motorState = 'stopped';
          clearJogPressed();
          updateMotorUi();
          return;
        }
        if (j.ok) {
          // Guarded jog accepted ({"ok":1}): the firmware runs a bounded PR0
          // move toward the limit. Keep the hold; releasing sends /stop.
          return refreshStatus();
        }
        if (typeof j.ms === 'number') {
          syncMotorStateFromServer(['stopped','cw','ccw'][j.ms]);
        }
        updateMotorUi();
      }).catch(function() {
        holdActive = false;
        motorState = 'stopped';
        clearJogPressed();
        document.getElementById('ms').textContent = 'Status: request failed';
        updateMotorUi();
      });
    }

    function endHold(direction) {
      if (!holdActive || motorState !== direction) return;
      holdActive = false;
      motorState = 'stopped';
      clearJogPressed();
      updateMotorUi();
      fetch('/stop').then(function(r) { return r.json(); }).then(function(j) {
        if (typeof j.ms === 'number') {
          syncMotorStateFromServer(['stopped','cw','ccw'][j.ms]);
        }
        return refreshStatus();
      }).catch(function() {
        // No watchdog on the firmware side: the motor may still be running.
        motorState = 'stopped';
        document.getElementById('ms').textContent =
          'Status: STOP FAILED - motor may still be running, press Stop again';
        updateMotorUi();
      });
    }

    function cmdStop() {
      holdActive = false;
      stopArmed = true;            // Stop turns green until the next jog press
      motorState = 'stopped';
      clearJogPressed();
      updateMotorUi();
      fetch('/stop').then(function(r) { return r.json(); }).then(function(j) {
        if (typeof j.ms === 'number') {
          syncMotorStateFromServer(['stopped','cw','ccw'][j.ms]);
        }
        return refreshStatus();
      }).catch(function() {
        document.getElementById('ms').textContent =
          'Status: STOP FAILED - motor may still be running, press Stop again';
        updateMotorUi();
      });
    }

    function cmdSpeed() {
      if (homingActive || moveActive) return;
      var el = document.getElementById('spd');
      var v = parseInt(document.getElementById('i-speed').value, 10);
      if (!isFinite(v) || v < 5 || v > 400) {
        el.textContent = 'Speed: enter 5 - 400 rpm';
        el.style.color = '#e57373';
        return;
      }
      fetch('/speed?v=' + v).then(function(r) { return r.json(); }).then(function(j) {
        if (j.error) {
          el.textContent = 'Speed: rejected (' + j.error + ')';
          el.style.color = '#e57373';
          return;
        }
        return refreshStatus();
      }).catch(function() {
        el.textContent = 'Speed: request failed';
        el.style.color = '#e57373';
      });
    }

    function cmdGoto() {
      if (homingActive || moveActive || !isHomed) return;
      var mm = parseFloat(document.getElementById('i-goto').value);
      var el = document.getElementById('move');
      if (!isFinite(mm) || mm < 0) {
        el.textContent = 'Go to: enter a position >= 0 mm (0 = CCW hard stop)';
        el.style.color = '#e57373';
        return;
      }
      if (limitsOn && (mm < limit1Mm - 1e-9 || mm > limit2Mm + 1e-9)) {
        el.textContent = 'Go to: target outside limits (' +
          limit1Mm.toFixed(2) + ' \u2013 ' + limit2Mm.toFixed(2) + ' mm)';
        el.style.color = '#e57373';
        return;
      }
      lastGotoMm = mm;
      var pulses = mmToCmdPulses(mm);

      moveActive = true;
      setMotionButtonsEnabled(false);
      document.getElementById('b-goto').classList.add('busy');
      el.textContent = 'Go to: moving to ' + formatMm(mm) + ' mm... (Stop = abort)';
      el.style.color = '#42a5f5';

      fetch('/goto?p=' + pulses).then(function(r) { return r.json(); }).then(function(j) {
        if (j.error) {
          moveActive = false;
          el.textContent = 'Go to: rejected (' + j.error + ')';
          el.style.color = '#e57373';
        }
        return refreshStatus();
      }).catch(function() {
        moveActive = false;
        el.textContent = 'Go to: request failed';
        el.style.color = '#e57373';
        return refreshStatus();
      });
    }

    function cmdHome() {
      if (homingActive || moveActive) return;
      var ok = confirm(
        'Start two-pass torque homing?\n\n' +
        'Pass 1: the motor runs CW to the FAR hard stop at 200 rpm.\n' +
        'Pass 2: the motor runs CCW across the WHOLE axis to the near\n' +
        'hard stop; the max length is measured there, then position 0\n' +
        'is set at that CCW hard stop.\n' +
        'Limits are then set at 10 mm and max length - 10 mm.\n\n' +
        'The Stop button is the ONLY way to abort (no automatic timeout).\n' +
        'Make sure the axis is free and stay at the controls.');
      if (!ok) return;

      homingActive = true;
      setMotionButtonsEnabled(false);
      document.getElementById('b-home').classList.add('busy');
      var el = document.getElementById('homing');
      el.textContent = 'Homing pass 1/2 \u2014 CW toward the far hard stop at 200 rpm... (Stop = abort)';
      el.style.color = '#b58900';

      fetch('/home').then(function(r) { return r.json(); }).then(function() {
        return refreshStatus();
      }).catch(function() {
        homingActive = false;
        setMotionButtonsEnabled(true);
        document.getElementById('b-home').classList.remove('busy');
        el.textContent = 'Homing: request failed';
        el.style.color = '#e57373';
      });
    }

    function bindJogButton(id, direction) {
      var btn = document.getElementById(id);

      btn.addEventListener('mousedown', function(e) {
        e.preventDefault();
        if (homingActive || moveActive) return;
        setJogPressed(id, true);
        startHold(direction);
      });
      btn.addEventListener('mouseup', function(e) {
        e.preventDefault();
        setJogPressed(id, false);
        endHold(direction);
      });
      btn.addEventListener('mouseleave', function() {
        setJogPressed(id, false);
        endHold(direction);
      });
      btn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (homingActive || moveActive) return;
        setJogPressed(id, true);
        startHold(direction);
      }, { passive: false });
      btn.addEventListener('touchend', function(e) {
        e.preventDefault();
        setJogPressed(id, false);
        endHold(direction);
      });
      btn.addEventListener('touchcancel', function(e) {
        e.preventDefault();
        setJogPressed(id, false);
        endHold(direction);
      });
    }

    bindJogButton('b-cw', 'cw');
    bindJogButton('b-ccw', 'ccw');

    refreshStatus();
    setInterval(refreshStatus, STATUS_POLL_MS);
  </script>
</body>
</html>
